<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manan — Daily Journal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    /* =============================================
       RESET & BASE (shared with index.html)
    ============================================= */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #08080f;
      --surface:  #0f0f1a;
      --card:     #14141f;
      --border:   #1e1e30;
      --accent:   #00e87a;
      --accent2:  #7b5fff;
      --accent3:  #ff6b35;
      --text:     #dcdcf0;
      --muted:    #52526e;
      --mono:     'IBM Plex Mono', monospace;
      --sans:     'Syne', sans-serif;
      --radius:   10px;
      --glow:     0 0 18px rgba(0,232,122,0.18);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(30,30,50,0.3) 1px, transparent 1px),
        linear-gradient(90deg, rgba(30,30,50,0.3) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* =============================================
       HEADER
    ============================================= */
    header {
      position: relative;
      z-index: 10;
      padding: 2.5rem 2rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,15,0.85);
      backdrop-filter: blur(10px);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      justify-content: space-between;
      gap: 1.5rem;
    }

    .brand-tag {
      font-size: 0.7rem;
      color: var(--accent2);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .brand-title {
      font-family: var(--sans);
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 800;
      line-height: 1;
      background: linear-gradient(120deg, #fff 0%, var(--accent2) 60%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0.3rem 0 0.2rem;
    }

    .brand-sub {
      font-size: 0.72rem;
      color: var(--muted);
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.5rem 1.1rem;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      border: 1px solid transparent;
    }

    .btn-ghost {
      background: var(--surface);
      border-color: var(--border);
      color: var(--text);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: var(--glow);
    }

    /* =============================================
       TOOLBAR / YEAR STRIP
    ============================================= */
    .toolbar {
      position: relative;
      z-index: 10;
      max-width: 1200px;
      margin: 1.8rem auto 0;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .year-stats {
      display: flex;
      gap: 1.2rem;
      flex-wrap: wrap;
    }

    .stat-chip {
      font-size: 0.7rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .stat-chip strong { color: var(--text); }

    /* Month filter */
    .month-scroll {
      display: flex;
      gap: 0.4rem;
      overflow-x: auto;
      padding-bottom: 0.2rem;
      scrollbar-width: none;
    }

    .month-scroll::-webkit-scrollbar { display: none; }

    .month-chip {
      flex-shrink: 0;
      padding: 0.3rem 0.75rem;
      border-radius: 50px;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: var(--mono);
      transition: all 0.18s;
    }

    .month-chip:hover { border-color: var(--accent2); color: var(--accent2); }
    .month-chip.active { background: var(--accent2); border-color: var(--accent2); color: #fff; }

    /* =============================================
       MAIN CONTENT
    ============================================= */
    .section {
      position: relative;
      z-index: 5;
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 2rem 5rem;
    }

    .month-group { margin-bottom: 2.5rem; }

    .month-heading {
      font-family: var(--sans);
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--accent2);
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .month-heading::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Days calendar grid */
    .days-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      gap: 0.65rem;
    }

    /* =============================================
       DAY CARD
    ============================================= */
    .day-card {
      position: relative;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 0.8rem 0.8rem;
      cursor: pointer;
      transition: all 0.18s ease;
      overflow: hidden;
    }

    .day-card:hover {
      border-color: rgba(123,95,255,0.45);
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.35), var(--glow2, 0 0 18px rgba(123,95,255,0.18));
    }

    .day-card.today {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(0,232,122,0.2) inset, var(--glow);
    }

    .day-card.has-entry {
      background: #131320;
      border-color: rgba(123,95,255,0.3);
    }

    .day-card.has-entry .day-num { color: var(--accent2); }

    .day-number-row {
      display: flex;
      align-items: baseline;
      gap: 0.35rem;
    }

    .day-num {
      font-family: var(--sans);
      font-size: 1.5rem;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
      transition: color 0.2s;
    }

    .day-label {
      font-size: 0.58rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .day-date-str {
      font-size: 0.58rem;
      color: var(--muted);
      margin-top: 0.25rem;
    }

    .day-status {
      position: absolute;
      top: 0.6rem;
      right: 0.6rem;
      font-size: 0.7rem;
    }

    /* Today pulse dot */
    .today-dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.8); }
    }

    /* Glow line bottom */
    .day-card .card-glow {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: var(--accent2);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s ease;
    }

    .day-card:hover .card-glow { transform: scaleX(0.5); }
    .day-card.today .card-glow { background: var(--accent); transform: scaleX(1); }
    .day-card.has-entry .card-glow { transform: scaleX(0.6); }

    /* =============================================
       MODAL
    ============================================= */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s ease;
    }

    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      max-width: 680px;
      width: 100%;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transform: translateY(20px) scale(0.97);
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }

    .modal-overlay.open .modal {
      transform: translateY(0) scale(1);
    }

    .modal-header {
      padding: 1.3rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-shrink: 0;
    }

    .modal-title-group { display: flex; flex-direction: column; gap: 0.2rem; }

    .modal-day-num {
      font-family: var(--sans);
      font-size: 1.5rem;
      font-weight: 800;
      background: linear-gradient(120deg, #fff, var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }

    .modal-date-str {
      font-size: 0.68rem;
      color: var(--muted);
    }

    .modal-close {
      width: 32px; height: 32px;
      border-radius: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .modal-close:hover { border-color: #ff4444; color: #ff4444; }

    .modal-body {
      padding: 1.5rem;
      overflow-y: auto;
      flex: 1;
    }

    .modal-body::-webkit-scrollbar { width: 4px; }
    .modal-body::-webkit-scrollbar-track { background: transparent; }
    .modal-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    .entry-content {
      font-size: 0.82rem;
      line-height: 1.85;
      color: var(--text);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .entry-missing {
      text-align: center;
      padding: 2.5rem 1rem;
      color: var(--muted);
    }

    .entry-missing .missing-icon { font-size: 2.5rem; margin-bottom: 0.75rem; display: block; }
    .entry-missing p { font-size: 0.78rem; line-height: 1.6; }
    .entry-missing code {
      font-family: var(--mono);
      background: var(--card);
      border: 1px solid var(--border);
      padding: 0.15em 0.45em;
      border-radius: 4px;
      color: var(--accent);
      font-size: 0.75rem;
    }

    .loading-spinner {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      gap: 0.5rem;
      color: var(--muted);
      font-size: 0.75rem;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent2);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Modal footer */
    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      gap: 0.75rem;
    }

    .modal-nav-btn {
      padding: 0.4rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--card);
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.68rem;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .modal-nav-btn:hover { border-color: var(--accent2); color: var(--accent2); }
    .modal-nav-btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }

    .modal-file-hint {
      font-size: 0.62rem;
      color: var(--muted);
    }

    /* =============================================
       RESPONSIVE
    ============================================= */
    @media (max-width: 600px) {
      header { padding: 1.5rem 1rem 1rem; }
      .toolbar { padding: 0 1rem; }
      .section { padding: 1rem 1rem 4rem; }
      .days-grid { grid-template-columns: repeat(auto-fill, minmax(82px, 1fr)); gap: 0.5rem; }
      .modal { max-height: 90vh; }
    }
  </style>
</head>
<body>

<!-- =============================================
     HEADER
============================================= -->
<header>
  <div class="header-inner">
    <div class="brand">
      <span class="brand-tag">// daily_journal v2026.04</span>
      <h1 class="brand-title">Daily Progress Log</h1>
      <p class="brand-sub">your journey from April 1, 2026 — documented day by day</p>
    </div>
    <div style="display:flex;gap:0.7rem;flex-wrap:wrap;align-items:center;">
      <div class="year-stats" style="margin-right:0.5rem;">
        <div class="stat-chip">Days unlocked: <strong id="days-unlocked">0</strong></div>
        <div class="stat-chip">Day of year: <strong id="day-of-year">—</strong></div>
      </div>
      <a href="index.html" class="btn btn-ghost">← skills dashboard</a>
    </div>
  </div>
</header>

<!-- =============================================
     MONTH FILTER
============================================= -->
<div class="toolbar">
  <div class="month-scroll" id="month-scroll"></div>
</div>

<!-- =============================================
     DAYS GRID
============================================= -->
<main class="section" id="calendar-container"></main>

<!-- =============================================
     MODAL
============================================= -->
<div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-day-title">
  <div class="modal" id="modal">
    <div class="modal-header">
      <div class="modal-title-group">
        <div class="modal-day-num" id="modal-day-title"></div>
        <div class="modal-date-str" id="modal-date-str"></div>
      </div>
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
      <!-- content injected here -->
    </div>
    <div class="modal-footer">
      <button class="modal-nav-btn" id="prev-day-btn">← prev</button>
      <span class="modal-file-hint" id="modal-file-hint"></span>
      <button class="modal-nav-btn" id="next-day-btn">next →</button>
    </div>
  </div>
</div>

<!-- =============================================
     JAVASCRIPT
============================================= -->
<script>
  // ============================================================
  // CONFIG
  // ============================================================
  const START_DATE = new Date('2026-04-01T00:00:00');
  const DAYS_FOLDER = 'days/'; // path where day1.txt, day2.txt... are stored

  // ============================================================
  // HELPERS
  // ============================================================
  const today = (() => {
    const d = new Date();
    d.setHours(0,0,0,0);
    return d;
  })();

  function daysBetween(a, b) {
    return Math.floor((b - a) / 86400000);
  }

  function dateForDay(n) { // n is 1-indexed
    const d = new Date(START_DATE);
    d.setDate(d.getDate() + (n - 1));
    return d;
  }

  function formatDate(d) {
    return d.toLocaleDateString('en-IN', {
      weekday: 'short', day: 'numeric', month: 'short', year: 'numeric'
    });
  }

  function monthKey(d) {
    return d.toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
  }

  const totalUnlocked = Math.max(1, daysBetween(START_DATE, today) + 1);

  // Day-of-year from Jan 1
  const jan1 = new Date(today.getFullYear(), 0, 1);
  const dayOfYear = Math.ceil((today - jan1) / 86400000) + 1;

  document.getElementById('days-unlocked').textContent = totalUnlocked;
  document.getElementById('day-of-year').textContent   = '#' + dayOfYear;

  // ============================================================
  // BUILD CALENDAR
  // ============================================================
  const days = [];
  for (let i = 1; i <= totalUnlocked; i++) {
    days.push({ n: i, date: dateForDay(i) });
  }

  // Group by month
  const monthGroups = {};
  const monthOrder  = [];
  days.forEach(d => {
    const key = monthKey(d.date);
    if (!monthGroups[key]) { monthGroups[key] = []; monthOrder.push(key); }
    monthGroups[key].push(d);
  });

  // Month filter chips
  const monthScroll = document.getElementById('month-scroll');
  const allChip = document.createElement('button');
  allChip.className = 'month-chip active';
  allChip.textContent = 'All months';
  allChip.dataset.month = 'all';
  monthScroll.appendChild(allChip);

  monthOrder.forEach(key => {
    const chip = document.createElement('button');
    chip.className = 'month-chip';
    chip.textContent = key;
    chip.dataset.month = key;
    monthScroll.appendChild(chip);
  });

  monthScroll.addEventListener('click', e => {
    const chip = e.target.closest('.month-chip');
    if (!chip) return;
    document.querySelectorAll('.month-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    filterMonth(chip.dataset.month);
  });

  function filterMonth(key) {
    document.querySelectorAll('.month-group').forEach(g => {
      g.style.display = (key === 'all' || g.dataset.month === key) ? '' : 'none';
    });
  }

  // Render calendar
  const container = document.getElementById('calendar-container');

  monthOrder.forEach(key => {
    const group = document.createElement('div');
    group.className = 'month-group';
    group.dataset.month = key;

    const heading = document.createElement('div');
    heading.className = 'month-heading';
    heading.textContent = key;
    group.appendChild(heading);

    const grid = document.createElement('div');
    grid.className = 'days-grid';

    monthGroups[key].forEach(d => {
      const isToday = d.date.getTime() === today.getTime();
      const card = document.createElement('div');
      card.className = 'day-card' + (isToday ? ' today' : '');
      card.dataset.day = d.n;

      const dow = d.date.toLocaleDateString('en-IN', { weekday: 'short' }).toUpperCase();
      const dateStr = d.date.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' });

      card.innerHTML = `
        <div class="day-number-row">
          <span class="day-num">${String(d.n).padStart(2,'0')}</span>
        </div>
        <div class="day-date-str">${dateStr} · ${dow}</div>
        <div class="day-status">${isToday ? '<span class="today-dot"></span>' : ''}</div>
        <div class="card-glow"></div>
      `;

      card.addEventListener('click', () => openModal(d.n));
      grid.appendChild(card);
    });

    group.appendChild(grid);
    container.appendChild(group);
  });

  // ============================================================
  // MODAL
  // ============================================================
  const overlay   = document.getElementById('modal-overlay');
  const modalBody = document.getElementById('modal-body');
  let currentDay  = 1;
  let cachedContent = {}; // simple cache

  function openModal(n) {
    currentDay = n;
    overlay.classList.add('open');
    document.body.style.overflow = 'hidden';
    loadDay(n);
  }

  function closeModal() {
    overlay.classList.remove('open');
    document.body.style.overflow = '';
  }

  async function loadDay(n) {
    const d = dateForDay(n);
    document.getElementById('modal-day-title').textContent = `Day ${n}`;
    document.getElementById('modal-date-str').textContent  = formatDate(d);
    document.getElementById('modal-file-hint').textContent = `${DAYS_FOLDER}day${n}.txt`;

    // Nav buttons
    const prevBtn = document.getElementById('prev-day-btn');
    const nextBtn = document.getElementById('next-day-btn');
    prevBtn.disabled = (n <= 1);
    nextBtn.disabled = (n >= totalUnlocked);

    // Show spinner
    modalBody.innerHTML = `
      <div class="loading-spinner">
        <div class="spinner"></div>
        <span>loading day${n}.txt...</span>
      </div>
    `;

    // Use cache
    if (cachedContent[n] !== undefined) {
      renderContent(n, cachedContent[n]);
      return;
    }

    // Fetch file
    try {
      const res = await fetch(`${DAYS_FOLDER}day${n}.txt`);
      if (!res.ok) throw new Error(`${res.status}`);
      const text = await res.text();
      cachedContent[n] = text;
      renderContent(n, text);
      // Mark card as has-entry
      const card = document.querySelector(`.day-card[data-day="${n}"]`);
      if (card) card.classList.add('has-entry');
    } catch (err) {
      cachedContent[n] = null;
      renderContent(n, null);
    }
  }

  function renderContent(n, text) {
    if (text !== null && text.trim() !== '') {
      modalBody.innerHTML = `<div class="entry-content">${escapeHtml(text)}</div>`;
    } else {
      const d = dateForDay(n);
      const isToday = d.getTime() === today.getTime();
      modalBody.innerHTML = `
        <div class="entry-missing">
          <span class="missing-icon">${isToday ? '✏️' : '📭'}</span>
          <p>${isToday
            ? `<strong>Today's entry is empty.</strong><br>Create <code>${DAYS_FOLDER}day${n}.txt</code> and write what you accomplished today.`
            : `No entry found for this day.<br>The file <code>${DAYS_FOLDER}day${n}.txt</code> doesn't exist yet.<br>Write what you did that day and upload it.`
          }</p>
        </div>
      `;
    }
  }

  function escapeHtml(str) {
    return str
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // Modal close
  document.getElementById('modal-close').addEventListener('click', closeModal);
  overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // Modal nav
  document.getElementById('prev-day-btn').addEventListener('click', () => {
    if (currentDay > 1) loadDay(--currentDay);
  });
  document.getElementById('next-day-btn').addEventListener('click', () => {
    if (currentDay < totalUnlocked) loadDay(++currentDay);
  });

  // Keyboard nav inside modal
  document.addEventListener('keydown', e => {
    if (!overlay.classList.contains('open')) return;
    if (e.key === 'ArrowLeft'  && currentDay > 1)            loadDay(--currentDay);
    if (e.key === 'ArrowRight' && currentDay < totalUnlocked) loadDay(++currentDay);
  });

  // ============================================================
  // AUTO-SCROLL TO TODAY
  // ============================================================
  setTimeout(() => {
    const todayCard = document.querySelector('.day-card.today');
    if (todayCard) todayCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 300);
</script>
</body>
</html>
